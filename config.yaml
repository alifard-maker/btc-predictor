# Dashboard login — set APP_PASSWORD on Railway (required for production)
app_password: ""

symbol: BTC/USD
exchange: coinbaseexchange
exchange_fallbacks:
  - coinbase
  - kraken
  - bitstamp

# Price feed — Kalshi BRTI (KXBTC15M settlement index)
price_feed:
  live: kalshi
  label: Kalshi CF Benchmarks BRTI
  settlement_reference: CF Benchmarks BRTI (Kalshi KXBTC15M)

# Kalshi — KXBTC15M BRTI target at t=0 + live BRTI via API passthrough
kalshi:
  enabled: true
  series_ticker: KXBTC15M
  base_url: https://api.elections.kalshi.com/trade-api/v2
  cache_sec: 15
  brti_cache_sec: 0
  brti_poll_sec: 1
  brti_index_id: BRTI
  brti_max_stale_sec: 5
  exchange_tick_cache_sec: 1
  live_fallback_exchange: true

# Calibration — only count predictions resolved with Kalshi BRTI open + close
calibration:
  kalshi_only: true

# 15-minute slot predictions — Eastern Time (:00, :15, :30, :45 ET)
prediction_horizon_minutes: 15
prediction_interval_minutes: 15
primary_timeframe: 15m
timezone: America/New_York

# Context: prior 12h in 15m slots (48 bars) + min candles for rolling indicators
lookback_hours: 12
min_candles_15m: 48
fetch_candles_15m: 96   # ~24h buffer for 48-period rolling features

# Candle intervals to collect
intervals:
  - 1m
  - 15m
  - 1h

historical_years: 3

fees:
  maker_pct: 0.10
  taker_pct: 0.10
slippage_pct: 0.05

min_edge_confidence: 0.57
no_trade_band: 0.03

paper:
  bankroll: 100.0
  risk_per_trade_pct: 1.0
  max_consecutive_losses: 3
  max_daily_drawdown_pct: 5.0

# Feature windows — counts are 15m candles
features:
  momentum_windows: [4, 8, 16, 32, 48]   # 1h, 2h, 4h, 8h, 12h on 15m chart
  volatility_window: 48                    # 12h
  rsi_period: 14
  volume_spike_window: 16                  # 4h baseline (emphasized for short horizon)
  vwap_window: 48                          # 12h anchor
  slot_lookback_candles: 16                # primary slot context = 4h
  slot_context_windows: [4, 16, 48]        # 1h, 4h, 12h multi-scale slot features
  expected_move_vol_candles: 4             # 1h vol for next-15m move estimate
  auxiliary: true
  session: true
  open_drive: true

# Intra-slot exit guidance (bet placed at t=0, manage during the 15m window)
intra_slot:
  take_profit_pct: 0.18       # % in your favor → consider locking gains
  stop_loss_pct: 0.15         # % against you → cut loss
  lock_profit_min_pct: 0.10   # min gain to lock when momentum reverses
  late_window_minutes: 3      # last N minutes — favor taking profit / cutting loss
  fee_buffer_pct: 0.13        # ~half round-trip cost — minimum "safe" net gain

# Late entry — reassess NO-TRADE slots mid-window (conservative)
late_entry:
  enabled: true
  outlook_after_minutes: 2      # show outlook bars after this much slot history
  min_elapsed_minutes: 4        # earliest minute to recommend entering
  min_remaining_minutes: 3      # need enough time left to justify fees
  min_confidence: 0.62          # stricter than open (0.57)
  min_move_pct: 0.04            # min |move| vs t=0
  min_side_time_pct: 0.58       # share of slot minutes on favorable side of ref
  max_ref_crossings: 1          # whipsaw guard (strict default)
  recovery_crossings: 2        # allow 2nd cross only under recovery rules below
  recovery_min_gap_pct: 0.20    # |move| vs t=0 required for dip-and-recover path
  recovery_recent_bars: 4       # last N 1m closes checked for persistence
  recovery_recent_above_pct: 0.75  # share of those bars on favorable side of ref
  momentum_bars: 4
  min_momentum_pct: 0.02

# 2nd Chance — reassess ALL slots at t+4min (11 min left)
second_chance:
  enabled: true
  elapsed_minutes: 4
  min_confidence: 0.57
  min_train_samples: 300
  train_test_split: 0.2
  model_type: lightgbm
  calibrate: true
  calibration_min_resolved: 30
  blend:
    ml_weight: 0.55
    open_weight: 0.25
    path_weight: 0.20

# Kalshi daily / hourly threshold + range contracts (separate tab on dashboard)
daily:
  enabled: true
  threshold_series: [KXBTCD, BTCD]   # hourly first — must bracket live BRTI
  range_series: [KXBTC, BTC]
  nearby_strikes: 30
  top_bands: 30
  max_markets_per_event: 1000
  max_event_candidates: 6
  strike_sigma_window: 2.5
  band_sigma_window: 2.5
  min_edge: 0.05
  vol_lookback_1h: 24
  drift_lookback_1h: 6

# Hourly ML + stats (Phases 1–4)
hourly:
  enabled: true
  log_minute: 5                    # log active event at :05 ET each hour
  min_train_samples: 500
  train_test_split: 0.2
  model_type: lightgbm
  calibrate: true
  calibration_min_resolved: 30
  use_15m_aggregate: true
  fetch_candles_1h: 720            # ~30 days native 1h bars for training
  blend:
    ml_weight: 0.6
    structure_weight: 0.4
  regime:
    enabled: true
    min_expected_move_pct: 0.12
    min_edge: 0.05
    min_hours_to_settle: 0.25
    max_sigma_pct: 2.5
    min_reasons_to_block: 2
  sigma_calibration: true

# Flip-to-opposite — after open LONG/SHORT is losing, one reverse bet per slot
flip:
  enabled: true
  max_flips_per_slot: 1          # no flip-back; after flip only HOLD/TP/CUT on new side
  min_elapsed_minutes: 3
  min_remaining_minutes: 5       # need time for reversed bet to work
  min_confidence: 0.63           # stricter than open (0.57) and late (0.62)
  min_loss_pct: 0.15             # open leg must be at stop-loss depth
  min_move_pct: 0.06             # |move| vs t=0 on flip side
  min_side_time_pct: 0.55
  min_momentum_pct: 0.02

model:
  type: lightgbm
  train_test_split: 0.2
  min_train_samples: 1500
  slot_labels: true
  calibrate: true

# Regime gates — skip chop / fee-dominated setups (not learned from model; rule-based)
regime:
  enabled: true
  min_reasons_to_block: 2       # single flag = note only; 2+ flags veto trade
  min_expected_move_pct: 0.08
  max_compression_ratio: 1.12
  min_vol_expansion: 0.82

# Daily full model retrain (calibrator still refits every 6h)
auto_train:
  enabled: true
  hour: 2
  minute: 0

paths:
  candles: data/candles
  models: data/models
  logs: data/logs
  db: data/logs/predictions.db
