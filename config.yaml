# Dashboard login — set APP_PASSWORD on Railway (required for production)
app_password: ""

symbol: BTC/USD
exchange: coinbaseexchange
exchange_fallbacks:
  - coinbase
  - kraken
  - bitstamp

# Price feed — Kalshi BRTI (KXBTC15M settlement index)
price_feed:
  live: kalshi
  label: Kalshi CF Benchmarks BRTI
  settlement_reference: CF Benchmarks BRTI (Kalshi KXBTC15M)

# Kalshi — KXBTC15M BRTI target at t=0 + live BRTI via API passthrough
kalshi:
  enabled: true
  series_ticker: KXBTC15M
  base_url: https://api.elections.kalshi.com/trade-api/v2
  cache_sec: 15
  circuit_breaker:
    enabled: true
    warn_threshold: 8
    failure_threshold: 12
    pause_on_429_after: 12
    pause_seconds: 30
    pause_seconds_429: 15
  brti_cache_sec: 2
  brti_poll_sec: 2
  brti_index_id: BRTI
  brti_max_stale_sec: 5
  balance_cache_sec: 30
  positions_cache_sec: 8
  exchange_tick_cache_sec: 1
  live_fallback_exchange: true

# Calibration — only count predictions resolved with Kalshi BRTI open + close
calibration:
  kalshi_only: true

# 15-minute slot predictions — Eastern Time (:00, :15, :30, :45 ET)
prediction_horizon_minutes: 15
prediction_interval_minutes: 15
primary_timeframe: 15m
timezone: America/New_York

# Context: prior 12h in 15m slots (48 bars) + min candles for rolling indicators
lookback_hours: 12
min_candles_15m: 48
fetch_candles_15m: 96   # ~24h buffer for 48-period rolling features

# Candle intervals to collect
intervals:
  - 1m
  - 15m
  - 1h

historical_years: 3

fees:
  maker_pct: 0.10
  taker_pct: 0.10
slippage_pct: 0.05

min_edge_confidence: 0.57
no_trade_band: 0.03

paper:
  bankroll: 100.0
  risk_per_trade_pct: 1.0
  max_consecutive_losses: 3
  max_daily_drawdown_pct: 5.0

# Feature windows — counts are 15m candles
features:
  momentum_windows: [4, 8, 16, 32, 48]   # 1h, 2h, 4h, 8h, 12h on 15m chart
  volatility_window: 48                    # 12h
  rsi_period: 14
  volume_spike_window: 16                  # 4h baseline (emphasized for short horizon)
  vwap_window: 48                          # 12h anchor
  slot_lookback_candles: 16                # primary slot context = 4h
  slot_context_windows: [4, 16, 48]        # 1h, 4h, 12h multi-scale slot features
  expected_move_vol_candles: 4             # 1h vol for next-15m move estimate
  auxiliary: true
  session: true
  open_drive: true

# Intra-slot exit guidance (bet placed at t=0, manage during the 15m window)
intra_slot:
  take_profit_pct: 0.18       # % in your favor → consider locking gains
  stop_loss_pct: 0.15         # % against you → cut loss
  lock_profit_min_pct: 0.10   # min gain to lock when momentum reverses
  late_window_minutes: 3      # last N minutes — favor taking profit / cutting loss
  fee_buffer_pct: 0.13        # ~half round-trip cost — minimum "safe" net gain
  bot:
    enabled: false
    mode: paper
    max_spend_per_slot_usd: 100
    allow_strong: false
    allow_actionable: false
    use_accumulated_profit: false
    profit_use_pct: 100
    paper_auto_refill: true
    continuous_enabled: true
    poll_seconds: 10
    paper_max_spread_cents: 40
    take_profit_enabled: true
    take_profit_mode: hybrid
    take_profit_pct: 0.12
    take_profit_usd: 0.10
    trail_arm_profit_pct: 0.05
    trail_giveback_pct: 0.30
    trail_arm_profit_usd: 0.10
    trail_giveback_usd: 0.05
    min_take_profit_pct: 0.05
    max_take_profit_pct: 0.20
    min_hold_seconds: 90
    cheap_leg_max_entry_cents: 20
    cheap_leg_cut_loss_cents: 10
    cheap_leg_cut_cooldown_seconds: 180
    leg_take_profit_cents: 3
    leg_stop_loss_cents: 4
    leg_stop_gate_min_remaining_seconds: 180
    leg_take_profit_usd: 0.10
    leg_trail_arm_usd: 0.10
    leg_trail_giveback_usd: 0.05
    leg_trail_giveback_pct: 0.30
    reassess_neutral_take_profit: true
    reassess_neutral_band: 0.07
    reassess_neutral_min_unrealized_usd: 0.05
    bot_adaptive_calibration:
      enabled: false   # 15m: opt-in only (hour-scale bucket memory hurts bet frequency)
    entry_strategy:
      enabled: true
      kelly_enabled: true
      kelly_fraction: 0.15
      min_ask_edge_cents: 5
      tail_entry_max_cents: 20
      tail_entry_block: false
      tail_entry_min_ask_edge_cents: 12
      max_entries_per_cycle: 1
      max_concurrent_positions: 1
      max_budget_fraction_per_entry: 0.30
      max_stake_per_entry_usd: 1.50
      max_contracts_per_entry: 4
      correlation_guard: false
    live_exit:
      cut_loss_min_usd: 0.20
      cut_loss_min_hold_seconds: 90
      block_cut_when_profitable: true
      cheap_leg_cut_min_hold_seconds: 60
      cheap_leg_cut_min_loss_usd: 0.12
      block_tail_entries: true
      tail_block_max_cents: 20
      reconcile_min_position_age_seconds: 30
      reconcile_grace_after_exit_seconds: 60
      take_profit_usd: 0.08
      profit_exit_cooldown_seconds: 20
      mid_price_take_profit_usd: 0.06
      mid_price_max_entry_cents: 50
      adopted_leg_cut_loss_min_hold_seconds: 300
      adopted_leg_cut_loss_min_usd: 0.50
      max_orphan_adopted_contracts: 12
      resting_fill_adopt_full_size: true
      max_resting_enters_per_hour: 6
    probe_no_trade:
      enabled: false
      min_prob: 0.58
      min_elapsed_pct: 7.0
    live_entry:
      cross_spread_enabled: true
      cross_spread_min_edge_cents: 12
      passive_limit_at: mid
    live_trial_align:
      enabled: true
      live_exit_mode: trial_legs
      entry_align_with_trial: true
      execution:
        mirror_trial_entry_execution: true
        block_reentry_while_resting: true
        mirror_trial_stake_sizing: true
        prefer_passive_below_edge_cents: 12
      stake:
        max_stake_per_entry_usd: 4.0
        max_budget_fraction_per_entry: 0.30
        max_contracts_per_entry: 8
      exits:
        leg_stop_reentry_cooldown_seconds: 600
        leg_stop_event_cooldown_seconds: 300
    trial:
      continuous_enabled: true
      poll_seconds: 10
      enabled: true
      mode: paper

# Late entry — reassess NO-TRADE slots mid-window (conservative)
late_entry:
  enabled: true
  outlook_after_minutes: 2      # show outlook bars after this much slot history
  min_elapsed_minutes: 4        # earliest minute to recommend entering
  min_remaining_minutes: 3      # need enough time left to justify fees
  min_confidence: 0.62          # stricter than open (0.57)
  min_move_pct: 0.04            # min |move| vs t=0
  min_side_time_pct: 0.58       # share of slot minutes on favorable side of ref
  max_ref_crossings: 1          # whipsaw guard (strict default)
  recovery_crossings: 2        # allow 2nd cross only under recovery rules below
  recovery_min_gap_pct: 0.20    # |move| vs t=0 required for dip-and-recover path
  recovery_recent_bars: 4       # last N 1m closes checked for persistence
  recovery_recent_above_pct: 0.75  # share of those bars on favorable side of ref
  momentum_bars: 4
  min_momentum_pct: 0.02

# 2nd Chance — reassess ALL slots at t+4min (11 min left)
second_chance:
  enabled: true
  elapsed_minutes: 4
  min_confidence: 0.57
  min_train_samples: 300
  train_test_split: 0.2
  model_type: lightgbm
  calibrate: true
  calibration_min_resolved: 30
  blend:
    ml_weight: 0.55
    open_weight: 0.25
    path_weight: 0.20

# Kalshi daily / hourly threshold + range contracts (separate tab on dashboard)
daily:
  enabled: true
  threshold_series: [KXBTCD]   # hourly KX series only (legacy BTCD dropped to cut API load)
  range_series: [KXBTC]
  discovery_cache_sec: 75
  nearby_strikes: 30
  top_bands: 30
  max_markets_per_event: 1000
  max_event_candidates: 6
  strike_sigma_window: 2.5
  band_sigma_window: 2.5
  min_edge: 0.05
  vol_lookback_1h: 24
  drift_lookback_1h: 6

# Hourly ML + stats (Phases 1–4)
hourly:
  enabled: true
  hour_open_snapshot: true       # snapshot at :00 ET (preview, not scored)
  open_log_minute: 0             # hour-open snapshot each hour
  log_minute: 5                  # official lock at :05 ET (calibration)
  late_call_minute: 45           # late-call trading snapshot at :45 ET (15 min before settle)
  min_train_samples: 500
  train_test_split: 0.2
  model_type: lightgbm
  calibrate: true
  calibration_min_resolved: 30
  use_15m_aggregate: true
  fetch_candles_1h: 720            # ~30 days native 1h bars for training
  blend:
    ml_weight: 0.6
    structure_weight: 0.4
  regime:
    enabled: true
    min_expected_move_pct: 0.12
    min_edge: 0.08
    min_hours_to_settle: 0.25
    max_sigma_pct: 2.5
    min_reasons_to_block: 2
  intrahour:
    enabled: true
    min_shock_pct: 0.8
    min_edge_for_highlight: 0.08
    min_edge_override_regime: 0.10
  bot:
    enabled: false
    mode: paper
    max_spend_per_hour_usd: 15
    allow_strong: false
    allow_actionable: false
    use_accumulated_profit: false
    profit_use_pct: 100
    paper_auto_refill: true
    continuous_enabled: true
    poll_seconds: 10
    take_profit_enabled: true
    take_profit_mode: hybrid
    take_profit_pct: 0.25
    take_profit_usd: 0.0
    trail_arm_profit_pct: 0.08
    trail_giveback_pct: 0.35
    trail_arm_profit_usd: 0.50
    min_take_profit_pct: 0.10
    max_take_profit_pct: 0.40
    min_hold_seconds: 90
    min_hours_to_settle_for_entry: 0.25  # block new legs in last 15m of hour (FREE mode too)
    max_hours_to_settle_for_entry: 1.25  # block entries on far-future hourly events (hour-edge guard)
    late_entry:
      enabled: true
      min_hours: 0.12          # don't enter in last ~7 min (was 5 — too much last-minute churn)
      min_ask_edge_cents: 15
      max_stake_usd: 2.50
    experiment_start_at: "2026-07-04T16:59:00+00:00"  # Jul 4 2026 12:59 PM EDT — stats & experiment baseline
    live_mechanics_profile: pnl_first  # Phase 0–1: BTC S1-only live (see docs/PnL_First_Ownership.md)
    profit_exit_cooldown_seconds: 60
    cheap_leg_max_entry_cents: 20
    cheap_leg_cut_loss_cents: 10
    cheap_leg_cut_cooldown_seconds: 300
    cut_loss_label_cooldown_seconds: 600
    live_entry:
      cross_spread_enabled: true
      cross_spread_min_edge_cents: 12
      passive_limit_at: mid
    cut_loss_late_hour_min_hours: 0.167
    near_strike_cut_min_hours: 0.083
    near_strike_tolerance_usd: 3.0
    entry_strategy:
      enabled: true
      risk_adjusted_ranking: true
      edge_tie_threshold: 0.03
      safety_weight: 0.40
      kelly_enabled: true
      kelly_fraction: 0.15
      min_ask_edge_cents: 9
      tail_entry_max_cents: 20
      tail_entry_block: false
      tail_entry_min_ask_edge_cents: 15
      max_entries_per_cycle: 4
      max_concurrent_positions: 12
      max_budget_fraction_per_entry: 0.25
      max_stake_per_entry_usd: 3.50
      max_contracts_per_entry: 6
      correlation_guard: true
      allow_barbell: true
      barbell_min_strike_gap_pct: 0.20
      allow_scale_in: true
      scale_in_max_legs_per_ticker: 4
      scale_in_min_unrealized_pnl_usd: 0.05
    live_inventory:
      enabled: true
      force_correlation_guard: true
      correlation_min_strike_gap_pct: 0.18
      max_same_side_threshold_legs: 1
      max_same_side_range_legs: 1
      max_concurrent_positions: 4
      max_entries_per_cycle: 4
      allow_scale_in: false
      max_contracts_per_range_band_per_hour: 8
      range_band_spot_entry_guard:
        enabled: true
        min_buffer_usd: 75
        sigma_buffer_fraction: 0.20
        min_spot_pct_buffer: 0.12   # ~$75 at $63k BTC
        by_asset:
          eth: { min_buffer_usd: 12, sigma_buffer_fraction: 0.22, min_spot_pct_buffer: 0.18 }
          spx: { min_buffer_usd: 25, sigma_buffer_fraction: 0.18, min_spot_pct_buffer: 0.10 }
          ndx: { min_buffer_usd: 90, sigma_buffer_fraction: 0.18, min_spot_pct_buffer: 0.10 }
    live_exit:
      cut_loss_min_usd: 0.20
      cut_loss_min_hold_seconds: 90
      block_cut_when_profitable: true
      cheap_leg_cut_min_hold_seconds: 30
      cheap_leg_cut_min_loss_usd: 0.15
      block_tail_entries: false
      tail_block_max_cents: 20
      reconcile_min_position_age_seconds: 45
      reconcile_grace_after_exit_seconds: 90
      take_profit_usd: 0.08
      profit_exit_cooldown_seconds: 30
      mid_price_take_profit_usd: 0.08
      mid_price_max_entry_cents: 60
      adopted_leg_cut_loss_min_hold_seconds: 300
      adopted_leg_cut_loss_min_usd: 0.50
      max_orphan_adopted_contracts: 12
      resting_fill_adopt_full_size: true
      max_resting_enters_per_hour: 24
    live_adaptive:
      enabled: true
      profit_lock_usd: 1.25
      min_rally_expected_move_pct: 0.15
      min_rally_grind_pct: 0.10
      rally_cross_spread_enabled: true
      rally_cross_spread_min_edge_cents: 15.0
      rally_cross_spread_requires_intrahour: true
      rally_max_same_side_threshold_legs: 2
      rally_max_same_side_range_legs: 0
      rally_max_entries_per_cycle: 2
      rally_min_ask_edge_cents: 8.0
      rally_block_range_bands: false
      defense_max_same_side_threshold_legs: 1
      defense_max_same_side_range_legs: 0
      defense_max_entries_per_cycle: 1
      defense_min_ask_edge_cents: 12.0
      defense_block_range_bands: false
      defense_skip_all_entries: false
      defense_threshold_only: false
    hold_overlays:
      defense_min_hold_seconds: 30
      conservative_min_hold_seconds: 30
      rally_min_hold_seconds: 90
      pressing_min_hold_seconds: 90
    quick_exit:
      enabled: true
      min_hold_seconds: 30
      cut_loss_min_hold_seconds: 30
      cut_loss_min_usd: 0.12
      take_profit_pct: 0.06
      take_profit_usd: 0.06
      apply_when:
        adaptive_mode: defense
        hour_momentum_state: conservative
    hour_momentum:
      enabled: true
      losing_pnl_usd: -0.01
      choppy_min_exits: 2
      choppy_pnl_band_usd: 0.25
      profit_protect_pnl_usd: 0.75
      min_closed_wins_to_press: 1
      conservative:
        max_entries_per_cycle: 2
        stake_mult: 0.8
        late_entry_min_ask_edge_cents: 18
      normal:
        max_entries_per_cycle: 4
        stake_mult: 1.0
        late_entry_min_ask_edge_cents: 15
      pressing:
        max_entries_per_cycle: 6
        stake_mult: 1.0
        max_stake_per_entry_usd: 4.0
        late_entry_min_ask_edge_cents: 12
      locked:
        max_entries_per_cycle: 2
        stake_mult: 0.7
        late_entry_min_ask_edge_cents: 20
        block_late_entry: true
    whipsaw_guard:
      enabled: true
      max_quick_exit_cuts_per_hour: 3
      pause_all_entries_after_cut_streak: true
      block_entries_when_regime_blocked: true
      block_scale_in_when_regime_blocked: true
      require_signal_refresh_after_spot_against_cut: true
      conservative_max_contracts_per_entry: 2
      event_cut_cooldown_seconds: 600
    live_trial_align:
      enabled: true
      live_exit_mode: trial_legs
      hybrid:
        adaptive_modes: [defense]
        hour_momentum_states: [conservative]
        max_hold_seconds: 600
      entry_align_with_trial: true
      align_live_inventory: true
      quick_exit:
        min_hold_seconds: 60
        cut_loss_min_hold_seconds: 60
      exits:
        leg_stop_reentry_cooldown_seconds: 600
        leg_stop_event_cooldown_seconds: 300
      stake:
        max_stake_per_entry_usd: 4.0
        max_budget_fraction_per_entry: 0.30
        max_contracts_per_entry: 8
      execution:
        mirror_trial_entry_execution: true
        block_reentry_while_resting: false
        mirror_trial_stake_sizing: true
        mirror_trial_scale_in: true
        prefer_passive_below_edge_cents: 12
        block_scale_in_after_quick_exit_cut: true
      whipsaw:
        max_quick_exit_cuts_per_hour: 2
      compare:
        pair_window_seconds: 180
    rally_only:
      enabled: false
      defense_skip_all_entries: true
      profit_lock_usd: 1.25
      rally_block_range_bands: false
      defense_block_range_bands: true
    soft_rally:
      enabled: true
      defense_skip_all_entries: false
      defense_threshold_only: true
      defense_min_ask_edge_cents: 15.0
      defense_yes_mid_min_cents: 40
      defense_yes_mid_max_cents: 80
      profit_lock_usd: 1.25
      rally_block_range_bands: false
      defense_block_range_bands: true
    trial:
      continuous_enabled: true
      poll_seconds: 10
      take_profit_enabled: true
      take_profit_mode: hybrid
      take_profit_pct: 0.12
      take_profit_usd: 0.10
      trail_arm_profit_pct: 0.05
      trail_giveback_pct: 0.30
      trail_arm_profit_usd: 0.10
      trail_giveback_usd: 0.05
      min_take_profit_pct: 0.05
      max_take_profit_pct: 0.20
      min_hold_seconds: 15
      profit_exit_cooldown_seconds: 60
      leg_take_profit_cents: 3
      leg_stop_loss_cents: 4
      leg_take_profit_usd: 0.10
      leg_trail_arm_usd: 0.10
      leg_trail_giveback_usd: 0.05
      leg_trail_giveback_pct: 0.30
      reassess_neutral_take_profit: true
      reassess_neutral_band: 0.07
      reassess_neutral_min_unrealized_usd: 0.05
    trial_rally:
      continuous_enabled: true
      poll_seconds: 10
    trial_soft:
      continuous_enabled: true
      poll_seconds: 10
    trial_mech:
      continuous_enabled: true
      poll_seconds: 10

# Hourly V2 — path-memory predictor + paper bot (fully isolated from v1 hourly above)
hourly_v2:
  enabled: true
  prediction_db: hourly_v2_predictions.db
  hour_open_snapshot: true
  open_log_minute: 0
  log_minute: 5
  late_call_minute: 45
  blend:
    path_weight: 0.55
    structure_weight: 0.45
  calibration:
    enabled: true              # load data/logs/hourly_v2_calibration.json when present
  path_memory:
    momentum_weight: 0.35
    recovery_weight: 0.25
    shock_threshold_pct: 0.5
  regime:
    enabled: true
    min_expected_move_pct: 0.10
    min_edge: 0.07
    min_hours_to_settle: 0.25
    max_sigma_pct: 2.5
    min_reasons_to_block: 2
  intrahour:
    enabled: true
    min_shock_pct: 0.6
    min_edge_for_highlight: 0.08
    min_edge_override_regime: 0.10
  bot:
    enabled: true
    mode: paper
    max_spend_per_hour_usd: 15
    continuous_enabled: true
    poll_seconds: 10
    experiment_start_at: "2026-07-04T16:59:00+00:00"
    entry_strategy:
      enabled: true
      min_ask_edge_cents: 9
      kelly_enabled: true
      kelly_fraction: 0.12
      max_entries_per_cycle: 3
      max_concurrent_positions: 8
    live_adaptive:
      enabled: true
      profit_lock_usd: 1.25
      defense_block_range_bands: false
      rally_block_range_bands: false

# Flip-to-opposite
flip:
  enabled: true
  max_flips_per_slot: 1          # no flip-back; after flip only HOLD/TP/CUT on new side
  min_elapsed_minutes: 3
  min_remaining_minutes: 5       # need time for reversed bet to work
  min_confidence: 0.63           # stricter than open (0.57) and late (0.62)
  min_loss_pct: 0.15             # open leg must be at stop-loss depth
  min_move_pct: 0.06             # |move| vs t=0 on flip side
  min_side_time_pct: 0.55
  min_momentum_pct: 0.02

model:
  type: lightgbm
  train_test_split: 0.2
  min_train_samples: 1500
  slot_labels: true
  calibrate: true

# Regime gates — skip chop / fee-dominated setups (not learned from model; rule-based)
regime:
  enabled: true
  min_reasons_to_block: 2       # single flag = note only; 2+ flags veto trade
  min_expected_move_pct: 0.08
  max_compression_ratio: 1.12
  min_vol_expansion: 0.82

# Daily full model retrain (calibrator still refits every 6h)
auto_train:
  enabled: true
  hour: 2
  minute: 0

# Paper bot threshold auto-tuning from trade logs (requires min_days history)
bot_risk:
  daily_loss_cap_enabled: true
  daily_loss_cap_usd: 50.0   # per bot (BTC hourly, ETH hourly, BTC 15m, ETH 15m each get own $50/day)
  daily_loss_timezone: America/New_York

# P&L-first Phase 0–1 (live_mechanics_profile: pnl_first on BTC hourly)
pnl_first:
  milestone_pipeline_hours: 20   # pipeline gate-stack proof (not PnL-gated fills)
  milestone_positive_hours: 20   # legacy alias
  live_ev_min_usd_per_contract: 0.02
  min_hours_to_settle_for_entry: 0.083  # 5 min — late-hour floor for live (regime + bot); global default 15m
  max_hours_to_settle_for_entry: 1.35   # hour-edge: allow current-hour entries (log_minute :05 is calibration-only, not entry)
  phase_started_at: "2026-07-04T23:30:00+00:00"
  defer_profit_target_minutes_to_settle: 30
  defer_profit_target_modes: [paper]

# 24/7 manager on Railway (sleep lock, preflight, milestone) — replaces local watchdog
pnl_first_manager:
  enabled: true
  interval_seconds: 30
  phase: prep
  enforce_sleep: true
  trading_armed: false
  auto_wake_when_ready: false
  owner_poa_live: true          # owner granted POA Jul 5 2026: may arm/wake if ping unanswered
  owner_poa_debug_cap_usd: 15.0 # max hourly cap when exercising POA for debug/live proof
  live_cap_usd: 30.0
  milestone_interval_minutes: 60
  auto_sync_on_reconcile: true
  lock_eth_live: true
  lock_slot15: true          # BTC/ETH 15m + trial bots — sleep during Phase 0–1
  allow_eth_paper: true      # Phase 2 prep: ETH hourly paper runs under sleep lock

# Resting limit sells on Kalshi after live cheap-leg entries (software bracket)
live_resting_exits:
  enabled: false
  cheap_leg_only: true
  bracket_take_profit: true

bot_auto_tune:
  enabled: true
  hour: 3
