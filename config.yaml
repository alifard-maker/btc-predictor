# Closed-loop bucket calibration: stats-driven soft throttle by entry-price bucket (all hourly bots)
bot_adaptive_calibration:
  enabled: true
  refresh_interval_minutes: 30
  short_window_hours: 4
  long_window_hours: 24
  short_min_trades: 4
  short_max_win_rate: 0.25
  short_min_loss_usd: 2.0
  long_min_trades: 8
  long_max_win_rate: 0.35
  long_min_loss_usd: 5.0
  # Soft throttle tiers (level 0 = normal). No timer blocks — stats re-eval every refresh.
  throttle_levels:
    - edge_boost_cents: 0
      stake_mult: 1.0
    - edge_boost_cents: 4
      stake_mult: 0.75
    - edge_boost_cents: 8
      stake_mult: 0.5
    - edge_boost_cents: 12
      stake_mult: 0.25
  apply_in_aggressive_mode: true
  price_buckets: true
  spread_buckets: false

