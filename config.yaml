# Walk-forward backtest — realistic fills, fees, and ML validation
backtest:
  horizon: hourly              # hourly | 15m
  train_window: 500            # bars per fold (1h for hourly, 15m for slots)
  test_window: 50
  step: 50
  order_style: passive_limit   # passive_limit | cross_spread
  time_to_settle_hours: 1.0
  volume_proxy: 1.0
  rng_seed: 42
  bootstrap_samples: 2000
  bootstrap_alpha: 0.05
  fees:
    maker_bps: 10              # 0.10% — matches fees.maker_pct
    taker_bps: 10
  fill_simulator:
    base_fill_rate: 0.55
    spread_distance_penalty: 0.08
    time_bonus_per_hour: 0.12
    volume_bonus_scale: 0.15
    default_spread_cents: 4
    contracts_per_trade: 1

paths:
  candles: data/candles
  models: data/models
  logs: data/logs
  db: data/logs/predictions.db

