<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Predictor — Sign in</title>
  <style>
    :root {
      --bg: #0c0c10; --surface: #14141c; --border: #2a2a38;
      --text: #f0f0f5; --muted: #8888a0; --accent: #6366f1; --down: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.75rem; width: 100%; max-width: 360px;
    }
    h1 { font-size: 1.35rem; margin-bottom: 0.35rem; }
    p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 0.65rem 0.75rem; font-size: 1rem; margin-bottom: 1rem;
    }
    button {
      width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 0.65rem; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .err { color: var(--down); font-size: 0.82rem; margin-bottom: 0.75rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BTC Predictor</h1>
    <p>Beta 1.0 — enter password to continue</p>
    <div id="err" class="err">Incorrect password</div>
    <form method="post" action="/api/auth/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required autofocus />
      <button type="submit">Sign in</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
